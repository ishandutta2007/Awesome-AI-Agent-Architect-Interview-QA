<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A2E" />
      <stop offset="50%" stop-color="#16213E" />
      <stop offset="100%" stop-color="#0F3460" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4FACFE">
        <animate attributeName="stop-color" values="#4FACFE;#00F2FE;#4FACFE" dur="4s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#00F2FE">
        <animate attributeName="stop-color" values="#00F2FE;#4FACFE;#00F2FE" dur="4s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
    <style>
      .title { font-family: 'Inter', system-ui, sans-serif; font-size: 42px; font-weight: 800; fill: url(#textGrad); }
      .subtitle { font-family: 'Inter', system-ui, sans-serif; font-size: 20px; font-weight: 400; fill: #E94560; }
      .pulse { animation: pulseAnim 3s infinite alternate; transform-origin: center; }
      .float1 { animation: floatAnim 6s ease-in-out infinite; }
      .float2 { animation: floatAnim 8s ease-in-out infinite reverse; }
      @keyframes pulseAnim {
        0% { transform: scale(0.95); opacity: 0.7; }
        100% { transform: scale(1.05); opacity: 1; }
      }
      @keyframes floatAnim {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-15px); }
      }
    </style>
  </defs>
  
  <rect width="800" height="200" rx="15" fill="url(#bgGrad)" />
  
  <!-- Dynamic background particles -->
  <circle cx="100" cy="50" r="4" fill="#4FACFE" opacity="0.5" class="float1" />
  <circle cx="700" cy="150" r="6" fill="#00F2FE" opacity="0.4" class="float2" />
  <circle cx="650" cy="40" r="3" fill="#E94560" opacity="0.6" class="float1" />
  <circle cx="150" cy="160" r="5" fill="#4FACFE" opacity="0.3" class="float2" />

  <!-- Animated center brain / node icon -->
  <g class="pulse" transform="translate(680, 100)">
    <circle cx="0" cy="0" r="40" fill="none" stroke="#E94560" stroke-width="4" stroke-dasharray="10 5">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="25" fill="none" stroke="#4FACFE" stroke-width="3">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="10" fill="#00F2FE" />
  </g>

  <text x="50" y="90" class="title">Awesome AI Agent Architect</text>
  <text x="50" y="130" class="subtitle">Interview Q&amp;A</text>
</svg>
